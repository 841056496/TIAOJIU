<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特调鸡尾酒</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg-card: #111110;
  --gold: #c9a962;
  --gold-dim: #8a7040;
  --gold-glow: rgba(201,169,98,0.15);
  --text: #cccccc;
  --text-dim: #777777;
  --border: #c9a96233;
  --overlay-bg: rgba(0,0,0,0.85);
  --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* === 封面区 === */
.hero {
  text-align: center;
  padding: 80px 20px 60px;
}
.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(36px, 6vw, 56px);
  color: var(--gold);
  letter-spacing: 12px;
  font-weight: 400;
}
.hero-subtitle {
  font-size: 13px;
  color: var(--gold-dim);
  letter-spacing: 8px;
  margin: 14px 0;
}
.hero-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}
.hero-desc {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 22px;
  letter-spacing: 2px;
}

/* === 筛选栏 === */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 20px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.filter-tag {
  background: transparent;
  color: var(--gold-dim);
  border: 1px solid var(--border);
  padding: 10px 24px;
  border-radius: 24px;
  cursor: pointer;
  font-size: 14px;
  letter-spacing: 2px;
  transition: all 0.35s ease;
  font-family: var(--font-sans);
}
.filter-tag:hover {
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow);
}
.filter-tag.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
  font-weight: 600;
  box-shadow: 0 0 24px rgba(201,169,98,0.25);
}

/* === 菜单主体 === */
.menu {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px 80px;
}

/* === 分区 === */
.menu-section {
  margin-bottom: 64px;
  animation: fadeInUp 0.5s ease both;
}
.menu-section:nth-child(1) { animation-delay: 0s; }
.menu-section:nth-child(2) { animation-delay: 0.1s; }
.menu-section:nth-child(3) { animation-delay: 0.2s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-header {
  text-align: center;
  margin-bottom: 36px;
}
.section-stars {
  display: block;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.section-label {
  font-size: 11px;
  color: var(--gold-dim);
  letter-spacing: 6px;
  text-transform: uppercase;
}

/* === 卡片网格 === */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, border-color 0.4s ease;
}
.card:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
  box-shadow: 0 12px 40px var(--gold-glow);
}

.card-img-wrap {
  width: 100%;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: #1a1a18;
  position: relative;
}
.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}
.card:hover .card-img {
  transform: scale(1.06);
}
.card-img-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
}

.card-info {
  padding: 18px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.card-name {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--gold);
  font-weight: 400;
  letter-spacing: 2px;
}
.card-price {
  font-size: 15px;
  color: var(--gold-dim);
  white-space: nowrap;
}

/* === 浮层 === */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.overlay-card {
  background: linear-gradient(145deg, #121210, #0d0d0c);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: min(460px, 100%);
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  transform: scale(0.88) translateY(24px);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 80px rgba(201,169,98,0.08), 0 20px 60px rgba(0,0,0,0.5);
}
.overlay.active .overlay-card {
  transform: scale(1) translateY(0);
}

.overlay-close {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 2;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(10,10,10,0.9);
  color: var(--gold);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
}
.overlay-close:hover {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}

.overlay-img-wrap {
  width: 100%;
  aspect-ratio: 16/10;
  overflow: hidden;
  background: #1a1a18;
  position: relative;
  border-radius: 12px 12px 0 0;
}
.overlay-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay-body {
  padding: 30px 34px 34px;
}
.overlay-name {
  font-family: var(--font-serif);
  font-size: 30px;
  color: var(--gold);
  font-weight: 400;
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.overlay-stars {
  font-size: 17px;
  letter-spacing: 4px;
  margin-bottom: 18px;
  color: var(--gold);
}
.overlay-desc {
  color: #bbbbbb;
  font-size: 15px;
  line-height: 1.9;
  margin-bottom: 24px;
}
.overlay-price-row {
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.overlay-price {
  font-family: var(--font-serif);
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 2px;
}
.overlay-level-tag {
  display: inline-block;
  padding: 4px 14px;
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 2px;
}
.overlay-glow {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* === 页脚 === */
.footer {
  text-align: center;
  padding: 40px 20px 60px;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 3px;
}
.footer-line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 0 auto 16px;
}

/* === 响应式 === */
@media (max-width: 640px) {
  .hero { padding: 50px 16px 40px; }
  .hero-title { letter-spacing: 6px; font-size: 32px; }
  .filter-bar { gap: 8px; padding: 14px 12px; }
  .filter-tag { padding: 8px 16px; font-size: 12px; letter-spacing: 1px; }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card-info { padding: 12px 10px; }
  .card-name { font-size: 14px; letter-spacing: 1px; }
  .card-price { font-size: 13px; }
  .overlay-body { padding: 22px 20px; }
  .overlay-name { font-size: 24px; }
  .overlay-desc { font-size: 14px; }
  .overlay { padding: 12px; }
  .menu { padding: 12px 14px 60px; }
  .section-header { margin-bottom: 22px; }
  .menu-section { margin-bottom: 44px; }
}
</style>
</head>
<body>

<!-- 封面 -->
<header class="hero">
  <div class="hero-line"></div>
  <h1 class="hero-title">特调鸡尾酒</h1>
  <p class="hero-subtitle">SPECIAL COCKTAILS</p>
  <div class="hero-line"></div>
  <p class="hero-desc">百分百特调 · 每一杯都是匠心之作</p>
</header>

<!-- 筛选栏 -->
<nav class="filter-bar">
  <button class="filter-tag active" data-filter="all">全部</button>
  <button class="filter-tag" data-filter="2">⭐⭐</button>
  <button class="filter-tag" data-filter="3">⭐⭐⭐</button>
  <button class="filter-tag" data-filter="5">⭐⭐⭐⭐⭐</button>
</nav>

<!-- 菜单 -->
<main class="menu" id="menuContainer"></main>

<!-- 浮层 -->
<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="overlay-card" id="overlayCard" onclick="event.stopPropagation()">
    <button class="overlay-close" onclick="closeDetail()" aria-label="关闭">✕</button>
    <div class="overlay-img-wrap">
      <img id="overlayImg" src="" alt="" class="overlay-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div id="overlayFallback" class="card-img-fallback" style="display:none">🍸</div>
    </div>
    <div class="overlay-body">
      <h2 id="overlayName" class="overlay-name"></h2>
      <div id="overlayStars" class="overlay-stars"></div>
      <p id="overlayDesc" class="overlay-desc"></p>
      <div class="overlay-price-row">
        <span id="overlayPrice" class="overlay-price"></span>
        <span id="overlayLevelTag" class="overlay-level-tag"></span>
      </div>
    </div>
    <div class="overlay-glow"></div>
  </div>
</div>

<!-- 页脚 -->
<footer class="footer">
  <div class="footer-line"></div>
  特调鸡尾酒 · SPECIAL COCKTAILS
</footer>

<script>
// === 数据 ===
const drinks = [
  { id: 1,  name: '青野汐沫',   desc: '抹茶味、口感绵密',                                                         price: 38, level: 2, img: 'images/page1_img1.jpeg' },
  { id: 2,  name: '椰林飘香',   desc: '浓郁顺滑、椰香四溢、热带风情、甜美迷人',                                 price: 38, level: 2, img: 'images/page1_img2.jpeg' },
  { id: 3,  name: '莫吉托',     desc: '薄荷清凉、酸甜平衡、海明威最爱的古巴国民饮品',                           price: 38, level: 2, img: 'images/page1_img3.jpeg' },
  { id: 4,  name: '少女百利甜', desc: '奶香、酒香、可可香完美融合，口感绵密，入口即化',                         price: 28, level: 2, img: 'images/page1_img4.jpeg' },
  { id: 5,  name: '碳酸冰岛',   desc: '雪碧的清爽，蓝橙的柑橘香',                                               price: 28, level: 2, img: 'images/page1_img5.jpeg' },
  { id: 6,  name: '拉莫斯金菲士', desc: '清新柑橘，奶香柔滑，带有橙花的淡雅芬芳，气泡轻盈，口感如云朵般绵密',   price: 38, level: 3, img: 'images/page2_img1.jpeg' },
  { id: 7,  name: '龙舌兰日出',   desc: '视觉如日出，色彩绚丽，甜中带酸，清爽怡人',                               price: 28, level: 3, img: 'images/page2_img2.jpeg' },
  { id: 8,  name: '菠萝金',       desc: '植物香气与热带水果风味结合，酸甜清爽',                                   price: 28, level: 3, img: 'images/page2_img3.jpeg' },
  { id: 9,  name: '威士忌酸',     desc: '世界最经典鸡尾酒之一，以威士忌的烈，碰撞柠檬的酸与甜浆的甜',             price: 28, level: 3, img: 'images/page2_img4.jpeg' },
  { id: 10, name: '大吉利',       desc: '清醒的柠檬香气与朗姆酒完美平衡，酸甜爽口，简单纯粹',                     price: 28, level: 3, img: 'images/page2_img5.jpeg' },
  { id: 11, name: '自由古巴',     desc: '朗姆与可乐气泡结合，经典不复杂，简单又迷人',                             price: 28, level: 5, img: 'images/page3_img1.jpeg' },
  { id: 12, name: '玛格丽特',     desc: '酸甜清爽，盐霜激发龙舌兰风味，纪念调酒师逝去的恋人',                     price: 28, level: 5, img: 'images/page3_img2.jpeg' },
  { id: 13, name: '僵尸',         desc: '多种朗姆酒叠加出热带层次，果香浓郁，酒感偏强',                           price: 38, level: 5, img: 'images/page3_img3.jpeg' },
  { id: 14, name: '长岛冰茶',     desc: '夏天的快乐是长岛冰茶给的，入口清爽带点烈，喝完脸蛋红红超微醺',           price: 38, level: 5, img: 'images/page3_img4.jpeg' },
];

const levelLabels = {
  2: { stars: '⭐⭐',     name: '微醺' },
  3: { stars: '⭐⭐⭐',   name: '半醺' },
  5: { stars: '⭐⭐⭐⭐⭐', name: '深醺' },
};

// === 渲染 ===
function renderMenu(filterLevel) {
  const container = document.getElementById('menuContainer');
  const levels = filterLevel === 'all' ? [2, 3, 5] : [filterLevel];

  let html = '';
  for (const level of levels) {
    const items = drinks.filter(d => d.level === level);
    if (items.length === 0) continue;
    const label = levelLabels[level];
    html += `<section class="menu-section">
      <div class="section-header">
        <span class="section-stars">${label.stars}</span>
        <span class="section-label">${label.name}</span>
      </div>
      <div class="card-grid">`;
    for (const drink of items) {
      html += `
        <div class="card" data-id="${drink.id}" onclick="openDetail(${drink.id})">
          <div class="card-img-wrap">
            <img src="${drink.img}" alt="${drink.name}" class="card-img" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-img-fallback" style="display:none">🍸</div>
          </div>
          <div class="card-info">
            <h3 class="card-name">${drink.name}</h3>
            <span class="card-price">¥${drink.price}</span>
          </div>
        </div>`;
    }
    html += `</div></section>`;
  }
  container.innerHTML = html;
}

// === 筛选 ===
document.querySelector('.filter-bar').addEventListener('click', (e) => {
  const tag = e.target.closest('.filter-tag');
  if (!tag) return;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  const filter = tag.dataset.filter === 'all' ? 'all' : parseInt(tag.dataset.filter);
  renderMenu(filter);
});

// === 浮层 ===
function openDetail(id) {
  const drink = drinks.find(d => d.id === id);
  if (!drink) return;
  const label = levelLabels[drink.level];

  const img = document.getElementById('overlayImg');
  img.src = drink.img;
  img.style.display = '';
  document.getElementById('overlayFallback').style.display = 'none';
  document.getElementById('overlayName').textContent = drink.name;
  document.getElementById('overlayStars').textContent = label.stars + ' ' + label.name;
  document.getElementById('overlayDesc').textContent = drink.desc;
  document.getElementById('overlayPrice').textContent = '¥' + drink.price;
  document.getElementById('overlayLevelTag').textContent = label.stars;
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

// 键盘关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

// === 初始渲染 ===
renderMenu('all');
</script>

</body>
</html>
